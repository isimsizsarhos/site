<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>İsimsiz Sarhoş</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .kart {
      background: white;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      max-width: 520px;
      width: 100%;
      overflow: hidden;
    }

    .hero {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid #e0e0e0;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 500;
      color: #1e40af;
      margin: 0 auto 1.25rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 15px;
      color: #666;
    }

    .bolum {
      padding: 1.5rem 1.25rem;
      border-bottom: 1px solid #e0e0e0;
    }

    .bolum h2 {
      font-size: 12px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }

    .hakkinda {
      font-size: 15px;
      line-height: 1.7;
      color: #333;
    }

    .beceriler {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .etiket {
      font-size: 13px;
      padding: 4px 12px;
      border-radius: 8px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      color: #555;
    }

    .iletisim-satir {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .etiket-kucuk {
      font-size: 13px;
      color: #999;
      min-width: 60px;
    }

    .footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="kart">

    <div class="hero">
      <div class="avatar">IS</div>
      <h1>İsimsiz Sarhoş</h1>
      <p class="tagline">ıssız bir adam.</p>
    </div>

    <div class="bolum">
      <h2>Hakkında</h2>
      <p class="hakkinda">ben belirsiz bir ıssız adamım.</p>
    </div>

    <div class="bolum">
      <h2>Beceriler</h2>
      <div class="beceriler">
        <span class="etiket">ıssız bir adam olmak
        <span class="etiket">ıssızlık
        <span class="etiket">ıssızlık</span>
        <span class="etiket">ıssızlık.</span>
      </div>
    </div>

    <div class="bolum">
      <h2>İletişim</h2>
      <div class="iletisim-satir">
        <span class="etiket-kucuk">E-posta</span>
        <span>isimsiz@sarhos.com</span>
      </div>
      <div class="iletisim-satir">
        <span class="etiket-kucuk">Şehir</span>
        <span>evren içerisinde biryerlerde.</span>
      </div>
    </div>

    <div class="bolum">
      <h2>Yılan Oyunu</h2>
      <div style="text-align:center;">
        <canvas id="oyun" width="400" height="400" style="border:1px solid #ddd; border-radius:8px; background:#111; max-width:100%;"></canvas>
        <div style="margin-top:10px; font-size:13px; color:#999;">Ok tuşlarıyla oyna. <span id="skor" style="color:#222; font-weight:500;">Skor: 0</span></div>
        <button onclick="baslat()" style="margin-top:10px; padding:6px 18px; border-radius:8px; border:1px solid #ddd; background:#f0f0f0; cursor:pointer; font-size:13px;">Yeniden Başla</button>
      </div>
    </div>

    <div class="footer">© 2026 İsimsiz Sarhoş — Hepsi bu kadar.</div>

  <script>
    const canvas = document.getElementById('oyun');
    const ctx = canvas.getContext('2d');
    const kutu = 20;
    let yilan, yon, yemek, skor, interval;

    function baslat() {
      yilan = [{x: 10, y: 10}];
      yon = {x: 1, y: 0};
      skor = 0;
      document.getElementById('skor').textContent = 'Skor: 0';
      yemekKoy();
      clearInterval(interval);
      interval = setInterval(oyunDongusu, 130);
    }

    function yemekKoy() {
      yemek = {
        x: Math.floor(Math.random() * (canvas.width / kutu)),
        y: Math.floor(Math.random() * (canvas.height / kutu))
      };
    }

    function oyunDongusu() {
      const bas = {x: yilan[0].x + yon.x, y: yilan[0].y + yon.y};
      const genislik = canvas.width / kutu;
      const yukseklik = canvas.height / kutu;

      if (bas.x < 0 || bas.x >= genislik || bas.y < 0 || bas.y >= yukseklik ||
          yilan.some(p => p.x === bas.x && p.y === bas.y)) {
        clearInterval(interval);
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.font = '22px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('Oyun Bitti!', canvas.width/2, canvas.height/2);
        return;
      }

      yilan.unshift(bas);
      if (bas.x === yemek.x && bas.y === yemek.y) {
        skor++;
        document.getElementById('skor').textContent = 'Skor: ' + skor;
        yemekKoy();
      } else {
        yilan.pop();
      }

      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#f87171';
      ctx.beginPath();
      ctx.arc((yemek.x + 0.5) * kutu, (yemek.y + 0.5) * kutu, kutu/2 - 2, 0, Math.PI * 2);
      ctx.fill();

      yilan.forEach((p, i) => {
        ctx.fillStyle = i === 0 ? '#4ade80' : '#22c55e';
        ctx.fillRect(p.x * kutu + 1, p.y * kutu + 1, kutu - 2, kutu - 2);
      });
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' && yon.y === 0) yon = {x: 0, y: -1};
      else if (e.key === 'ArrowDown' && yon.y === 0) yon = {x: 0, y: 1};
      else if (e.key === 'ArrowLeft' && yon.x === 0) yon = {x: -1, y: 0};
      else if (e.key === 'ArrowRight' && yon.x === 0) yon = {x: 1, y: 0};
    });

    baslat();
  </script>

  </div>
</body>
</html>
